name: CI Training - Indonesian Job Classifier

on:
  push:
    branches: [main]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MLflow and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 dagshub scikit-learn pandas numpy matplotlib nltk

      - name: Configure DagsHub credentials
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python -c "import dagshub, os; dagshub.auth.add_app_token(os.environ['DAGSHUB_TOKEN'])"

      - name: Run MLflow Project training
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/adinplb/Eksperimen_SML_Muhammad-Adin-Palimbani.mlflow
          MLFLOW_TRACKING_USERNAME: adinplb
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject/ --env-manager=local -P dataset_path=MLProject/jobs_preprocessing.csv

      - name: Upload training artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ github.run_number }}
          path: |
            mlruns/
            MLProject/mlflow_run_id.txt
          retention-days: 30

      - name: Read MLflow Run ID
        id: run_id
        run: |
          RUN_ID=$(cat MLProject/mlflow_run_id.txt 2>/dev/null || echo "latest")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Run ID: $RUN_ID"

      - name: Check Docker availability
        id: docker_check
        run: |
          if command -v docker &> /dev/null; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Docker not available, skipping build and push steps"
          fi
        shell: bash

      - name: Build Docker image with MLflow
        if: steps.docker_check.outputs.available == 'true'
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/adinplb/Eksperimen_SML_Muhammad-Adin-Palimbani.mlflow
          MLFLOW_TRACKING_USERNAME: adinplb
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          RUN_ID=${{ steps.run_id.outputs.run_id }}
          mlflow models build-docker \
            -m "runs:/${RUN_ID}/model" \
            -n "adinplb/career-job-classifier" \
            --enable-mlserver

      - name: Login to Docker Hub
        if: steps.docker_check.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        if: steps.docker_check.outputs.available == 'true'
        run: |
          docker tag adinplb/career-job-classifier:latest adinplb/career-job-classifier:${{ github.run_number }}
          docker push adinplb/career-job-classifier:latest
          docker push adinplb/career-job-classifier:${{ github.run_number }}
          echo "Image pushed: adinplb/career-job-classifier:${{ github.run_number }}"
