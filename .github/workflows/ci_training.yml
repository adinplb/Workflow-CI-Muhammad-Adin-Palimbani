name: CI Training - Indonesian Job Classifier

on:
  push:
    branches: [main]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train-and-build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MLflow and dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 dagshub scikit-learn pandas numpy matplotlib nltk

      - name: Run MLflow Project training
        shell: powershell
        run: |
          mlflow run MLProject --env-manager=local -P dataset_path=MLProject/jobs_preprocessing.csv

      - name: Show training results
        shell: powershell
        run: |
          if (Test-Path "MLProject\mlflow_run_id.txt") {
            $RUN_ID = Get-Content "MLProject\mlflow_run_id.txt"
            echo "Training berhasil. Run ID: $RUN_ID"
          } else {
            echo "Training completed successfully."
          }

      - name: Save run ID to repository
        shell: powershell
        run: |
          git config user.email "adinplb@users.noreply.github.com"
          git config user.name "adinplb"
          git add MLProject/mlflow_run_id.txt
          git diff --staged --quiet || git commit -m "ci: update mlflow run ID [skip ci]"
          git push

      - name: Read MLflow Run ID
        id: run_id
        shell: powershell
        run: |
          $RUN_ID = if (Test-Path "MLProject\mlflow_run_id.txt") { Get-Content "MLProject\mlflow_run_id.txt" } else { "latest" }
          echo "run_id=$RUN_ID" >> $env:GITHUB_OUTPUT
          echo "Run ID: $RUN_ID"

      - name: Build Docker image with MLflow
        shell: powershell
        env:
          MLFLOW_TRACKING_URI: mlruns
        run: |
          $RUN_ID = "${{ steps.run_id.outputs.run_id }}"
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n "adinplb/career-job-classifier" --enable-mlserver

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        shell: powershell
        run: |
          docker tag adinplb/career-job-classifier:latest adinplb/career-job-classifier:${{ github.run_number }}
          docker push adinplb/career-job-classifier:latest
          docker push adinplb/career-job-classifier:${{ github.run_number }}
          echo "Image pushed: adinplb/career-job-classifier:${{ github.run_number }}"
