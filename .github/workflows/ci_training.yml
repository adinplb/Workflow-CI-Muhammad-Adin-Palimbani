name: CI Training - Indonesian Job Classifier

on:
  push:
    branches: [main]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train-and-build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MLflow and dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 dagshub scikit-learn pandas numpy matplotlib nltk

      - name: Run MLflow Project training
        shell: powershell
        run: |
          cd MLProject
          python modelling.py --dataset jobs_preprocessing.csv --max_features 5000 --C 1.0 --max_iter 1000

      - name: Upload training artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ github.run_number }}
          path: |
            MLProject/mlruns/
            MLProject/mlflow_run_id.txt
          retention-days: 30

      - name: Read MLflow Run ID
        id: run_id
        shell: powershell
        run: |
          $RUN_ID = if (Test-Path "MLProject\mlflow_run_id.txt") { Get-Content "MLProject\mlflow_run_id.txt" } else { "latest" }
          echo "run_id=$RUN_ID" >> $env:GITHUB_OUTPUT
          echo "Run ID: $RUN_ID"

      - name: Check Docker availability
        id: docker_check
        shell: powershell
        run: |
          $dockerAvailable = $null -ne (Get-Command docker -ErrorAction SilentlyContinue)
          if ($dockerAvailable) {
            echo "available=true" >> $env:GITHUB_OUTPUT
            echo "Docker is available"
          } else {
            echo "available=false" >> $env:GITHUB_OUTPUT
            echo "Docker not available, skipping build and push steps"
          }

      - name: Build Docker image with MLflow
        if: steps.docker_check.outputs.available == 'true'
        shell: powershell
        env:
          MLFLOW_TRACKING_URI: mlruns
        run: |
          $RUN_ID = "${{ steps.run_id.outputs.run_id }}"
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n "adinplb/career-job-classifier" --enable-mlserver

      - name: Login to Docker Hub
        if: steps.docker_check.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        if: steps.docker_check.outputs.available == 'true'
        shell: powershell
        run: |
          docker tag adinplb/career-job-classifier:latest adinplb/career-job-classifier:${{ github.run_number }}
          docker push adinplb/career-job-classifier:latest
          docker push adinplb/career-job-classifier:${{ github.run_number }}
